<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>watchlog dashboard</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>👁️</text></svg>">
<style>
  :root {
    --bg: #0f172a;
    --bg-elevated: #1e293b;
    --bg-card: #334155;
    --fg: #f1f5f9;
    --fg-muted: #94a3b8;
    --accent: #22d3ee;
    --green: #34d399;
    --yellow: #fbbf24;
    --red: #f87171;
    --border: #475569;
    --code-bg: #020617;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
    background: var(--bg);
    color: var(--fg);
    line-height: 1.5;
    -webkit-font-smoothing: antialiased;
  }
  a { color: var(--accent); text-decoration: none; }
  a:hover { text-decoration: underline; }
  code, pre {
    font-family: ui-monospace, "SF Mono", Menlo, monospace;
    background: var(--code-bg);
    color: var(--fg);
    border-radius: 4px;
  }
  code { padding: 0.1em 0.4em; font-size: 0.9em; }
  pre { padding: 1rem; overflow-x: auto; font-size: 0.85rem; line-height: 1.5; max-height: 400px; }

  /* Layout */
  header {
    background: rgba(15, 23, 42, 0.85);
    backdrop-filter: blur(8px);
    border-bottom: 1px solid var(--border);
    padding: 1rem 1.5rem;
    display: flex;
    justify-content: space-between;
    align-items: center;
    position: sticky;
    top: 0;
    z-index: 10;
  }
  header .logo { font-weight: 700; font-size: 1.15rem; }
  header .meta { color: var(--fg-muted); font-size: 0.85rem; }
  header button { font: inherit; cursor: pointer; }
  header .logout {
    background: transparent;
    color: var(--fg-muted);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 0.35rem 0.8rem;
    font-size: 0.85rem;
  }
  header .logout:hover { color: var(--red); border-color: var(--red); }

  main {
    max-width: 1100px;
    margin: 0 auto;
    padding: 1.5rem;
  }

  /* Login screen */
  .login {
    max-width: 400px;
    margin: 8vh auto;
    background: var(--bg-elevated);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 2rem;
  }
  .login h1 { font-size: 1.4rem; margin-bottom: 0.5rem; }
  .login p { color: var(--fg-muted); margin-bottom: 1.5rem; font-size: 0.95rem; }
  .login input {
    width: 100%;
    background: var(--bg);
    color: var(--fg);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 0.65rem 0.85rem;
    font: inherit;
    margin-bottom: 1rem;
  }
  .login input:focus { outline: none; border-color: var(--accent); }
  .login button {
    width: 100%;
    background: var(--accent);
    color: var(--bg);
    border: 0;
    border-radius: 6px;
    padding: 0.65rem 0.85rem;
    font: inherit;
    font-weight: 600;
    cursor: pointer;
  }
  .login button:hover { background: #06b6d4; }
  .login .err {
    color: var(--red);
    font-size: 0.85rem;
    margin-top: 0.5rem;
    min-height: 1em;
  }

  /* Status banner */
  .status-banner {
    background: var(--bg-elevated);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 1.25rem 1.5rem;
    margin-bottom: 1.5rem;
    display: grid;
    grid-template-columns: auto 1fr auto;
    gap: 1.5rem;
    align-items: center;
  }
  .status-banner.severity-OK { border-color: var(--green); }
  .status-banner.severity-INFO { border-color: var(--accent); }
  .status-banner.severity-WARN { border-color: var(--yellow); }
  .status-banner.severity-CRITICAL { border-color: var(--red); }

  .status-banner .icon { font-size: 2.5rem; }
  .status-banner .summary .title { font-size: 1.15rem; font-weight: 600; margin-bottom: 0.25rem; }
  .status-banner .summary .meta { color: var(--fg-muted); font-size: 0.9rem; }

  /* Action buttons grid */
  .actions {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
    gap: 0.75rem;
    margin-bottom: 1.5rem;
  }
  .action-btn {
    background: var(--bg-elevated);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 0.85rem 1rem;
    color: var(--fg);
    font: inherit;
    font-size: 0.95rem;
    cursor: pointer;
    text-align: left;
    transition: border-color 0.1s;
  }
  .action-btn:hover { border-color: var(--accent); }
  .action-btn.green { border-color: var(--green); }
  .action-btn.green:hover { background: rgba(52, 211, 153, 0.1); }
  .action-btn[disabled] { opacity: 0.5; cursor: not-allowed; }
  .action-btn .lbl { display: block; }
  .action-btn .desc { display: block; font-size: 0.8rem; color: var(--fg-muted); margin-top: 0.2rem; }

  /* Checks table */
  .checks {
    background: var(--bg-elevated);
    border: 1px solid var(--border);
    border-radius: 12px;
    overflow: hidden;
    margin-bottom: 1.5rem;
  }
  .checks h2 {
    font-size: 1rem;
    padding: 1rem 1.25rem;
    border-bottom: 1px solid var(--border);
    color: var(--fg-muted);
    font-weight: 600;
    display: flex;
    justify-content: space-between;
  }
  .check-row {
    display: grid;
    grid-template-columns: 2.5rem minmax(140px, 200px) 1fr auto;
    align-items: center;
    padding: 0.85rem 1.25rem;
    border-bottom: 1px solid var(--border);
    gap: 1rem;
  }
  .check-row:last-child { border-bottom: 0; }
  .check-row .check-name { color: var(--accent); font-family: ui-monospace, monospace; font-size: 0.92rem; }
  .check-row .check-title { color: var(--fg-muted); font-size: 0.92rem; }
  .check-row .check-actions { display: flex; gap: 0.4rem; }
  .check-row .check-actions button {
    background: transparent;
    border: 1px solid var(--border);
    color: var(--fg-muted);
    border-radius: 4px;
    padding: 0.25rem 0.5rem;
    cursor: pointer;
    font-size: 0.75rem;
  }
  .check-row .check-actions button:hover { border-color: var(--accent); color: var(--fg); }
  .check-row.silenced { opacity: 0.6; }
  .check-row .badge { padding: 0.05em 0.5em; border-radius: 3px; font-size: 0.7rem; font-weight: 500; margin-left: 0.4rem; }
  .check-row .badge.snoozed { background: rgba(34, 211, 238, 0.15); color: var(--accent); }
  .check-row .badge.ignored { background: rgba(248, 113, 113, 0.15); color: var(--red); }

  /* Output drawer */
  .output {
    background: var(--bg-elevated);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 1rem 1.25rem;
    margin-bottom: 1.5rem;
  }
  .output h3 {
    font-size: 0.95rem;
    margin-bottom: 0.75rem;
    color: var(--fg-muted);
  }
  .output pre { background: var(--code-bg); }

  /* Toast */
  .toast {
    position: fixed;
    top: 1rem;
    right: 1rem;
    background: var(--bg-elevated);
    border: 1px solid var(--accent);
    border-radius: 8px;
    padding: 0.85rem 1.25rem;
    color: var(--fg);
    font-size: 0.9rem;
    box-shadow: 0 4px 16px rgba(0, 0, 0, 0.3);
    transform: translateX(110%);
    transition: transform 0.2s;
    z-index: 100;
  }
  .toast.show { transform: translateX(0); }
  .toast.error { border-color: var(--red); }

  .hidden { display: none !important; }

  .footer-meta {
    color: var(--fg-muted);
    font-size: 0.8rem;
    text-align: center;
    margin: 2rem 0 1rem;
  }
</style>
</head>
<body>

<!-- Login screen -->
<div id="login-screen" class="login">
  <h1>👁️ watchlog</h1>
  <p>Enter your API token to access the dashboard.</p>
  <input type="password" id="token-input" placeholder="Bearer token" autocomplete="off">
  <button id="login-btn">Sign in</button>
  <div id="login-err" class="err"></div>
</div>

<!-- Main UI -->
<div id="app" class="hidden">
  <header>
    <div>
      <span class="logo">👁️ watchlog</span>
      <span class="meta" id="header-meta"></span>
    </div>
    <button class="logout" id="logout-btn">Sign out</button>
  </header>

  <main>
    <div id="status-banner" class="status-banner">
      <div class="icon" id="banner-icon">⏳</div>
      <div class="summary">
        <div class="title" id="banner-title">Loading…</div>
        <div class="meta" id="banner-meta"></div>
      </div>
      <button class="action-btn" id="refresh-btn">🔄 Refresh</button>
    </div>

    <div class="actions">
      <button class="action-btn green" id="apply-sec-btn">
        <span class="lbl">✅ Apply security updates</span>
        <span class="desc">Run unattended-upgrade -v</span>
      </button>
      <button class="action-btn" id="run-now-btn">
        <span class="lbl">🔄 Run watchlog now</span>
        <span class="desc">Refresh all checks immediately</span>
      </button>
      <button class="action-btn" id="clear-state-btn">
        <span class="lbl">🧹 Clear all snoozes/ignores</span>
        <span class="desc">Reset alert silencing</span>
      </button>
    </div>

    <div class="checks">
      <h2>
        <span>Current checks</span>
        <span id="checks-summary"></span>
      </h2>
      <div id="checks-list"></div>
    </div>

    <div id="output-drawer" class="output hidden">
      <h3 id="output-title">Output</h3>
      <pre id="output-content"></pre>
    </div>

    <div class="footer-meta">
      watchlog API · <a href="/docs" target="_blank">OpenAPI docs</a> ·
      <a href="https://github.com/Belikebee1/watchlog" target="_blank">GitHub</a>
    </div>
  </main>
</div>

<div id="toast" class="toast"></div>

<script>
  const API = '/api/v1';
  const TOKEN_KEY = 'watchlog_token';
  let token = localStorage.getItem(TOKEN_KEY) || '';

  // ----- helpers -----
  const $ = (id) => document.getElementById(id);
  const show = (el) => el.classList.remove('hidden');
  const hide = (el) => el.classList.add('hidden');

  function toast(msg, isError = false) {
    const t = $('toast');
    t.textContent = msg;
    t.classList.toggle('error', isError);
    t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 4000);
  }

  async function api(method, path, body) {
    const opts = {
      method,
      headers: { 'Authorization': 'Bearer ' + token, 'Content-Type': 'application/json' },
    };
    if (body) opts.body = JSON.stringify(body);
    const res = await fetch(API + path, opts);
    if (res.status === 401) {
      logout();
      throw new Error('Invalid token');
    }
    if (!res.ok) {
      const txt = await res.text().catch(() => '');
      throw new Error(`HTTP ${res.status}: ${txt.slice(0, 200)}`);
    }
    return res.json();
  }

  // ----- login -----
  function loginVisible() {
    if (token) {
      hide($('login-screen'));
      show($('app'));
      refresh();
    } else {
      show($('login-screen'));
      hide($('app'));
    }
  }

  async function tryLogin(t) {
    token = t;
    try {
      // verify by hitting protected endpoint
      const res = await fetch(API + '/status', {
        headers: { 'Authorization': 'Bearer ' + token },
      });
      if (res.status === 401) {
        $('login-err').textContent = 'Invalid token.';
        token = '';
        return;
      }
      // 503 (no heartbeat yet) is fine – token works, just no data
      if (!res.ok && res.status !== 503) {
        $('login-err').textContent = `HTTP ${res.status}`;
        token = '';
        return;
      }
      localStorage.setItem(TOKEN_KEY, token);
      $('login-err').textContent = '';
      $('token-input').value = '';
      loginVisible();
    } catch (e) {
      $('login-err').textContent = 'Network error: ' + e.message;
      token = '';
    }
  }

  function logout() {
    token = '';
    localStorage.removeItem(TOKEN_KEY);
    loginVisible();
  }

  $('login-btn').addEventListener('click', () => {
    const t = $('token-input').value.trim();
    if (t) tryLogin(t);
  });
  $('token-input').addEventListener('keydown', (e) => {
    if (e.key === 'Enter') $('login-btn').click();
  });
  $('logout-btn').addEventListener('click', logout);

  // ----- main view -----
  const SEV_ICON = { OK: '✅', INFO: 'ℹ️', WARN: '⚠️', CRITICAL: '🔴' };
  const SEV_RANK = { OK: 0, INFO: 1, WARN: 2, CRITICAL: 3 };

  async function refresh() {
    try {
      const [status, state] = await Promise.all([
        api('GET', '/status').catch(() => null),
        api('GET', '/state').catch(() => ({ snoozes: {}, ignores: {} })),
      ]);
      renderStatus(status, state);
    } catch (e) {
      toast('Refresh failed: ' + e.message, true);
    }
  }

  function renderStatus(s, state) {
    const banner = $('status-banner');
    banner.className = 'status-banner';

    if (!s) {
      banner.classList.add('severity-WARN');
      $('banner-icon').textContent = '⏳';
      $('banner-title').textContent = 'No heartbeat yet';
      $('banner-meta').textContent = 'Run watchlog at least once to populate the dashboard.';
      $('checks-list').innerHTML = '';
      $('checks-summary').textContent = '';
      $('header-meta').textContent = '';
      return;
    }

    banner.classList.add('severity-' + s.worst_severity);
    $('banner-icon').textContent = SEV_ICON[s.worst_severity] || '?';
    const ageMin = s.age_seconds != null ? Math.round(s.age_seconds / 60) : null;
    const ageStr = ageMin == null ? 'unknown age' :
      ageMin < 60 ? `${ageMin} min ago` :
      `${(ageMin / 60).toFixed(1)} h ago`;

    if (s.worst_severity === 'OK' || s.worst_severity === 'INFO') {
      $('banner-title').textContent = `All clear – ${s.checks_total} checks`;
      $('banner-meta').textContent = `Last run ${ageStr} on ${s.host} · v${s.watchlog_version}`;
    } else {
      const cnt = s.actionable.length;
      $('banner-title').textContent = `${cnt} item(s) need attention`;
      $('banner-meta').textContent = `${s.worst_severity} · last run ${ageStr} on ${s.host}`;
    }

    const c = s.counts || {};
    $('checks-summary').textContent =
      `${c.OK || 0} OK · ${c.INFO || 0} INFO · ${c.WARN || 0} WARN · ${c.CRITICAL || 0} CRITICAL`;
    $('header-meta').textContent = `· ${s.host}`;

    // List actionable + silenced
    const list = $('checks-list');
    list.innerHTML = '';

    const allChecks = [];
    (s.actionable || []).forEach((a) => allChecks.push({ ...a, silenced: false }));

    // Add silenced ones from state, even if not in actionable
    Object.keys(state.snoozes || {}).forEach((name) => {
      if (!allChecks.find((c) => c.check === name)) {
        allChecks.push({ check: name, severity: 'INFO', title: '(snoozed)', silenced: true });
      } else {
        allChecks.find((c) => c.check === name).silencedBy = 'snoozed';
      }
    });
    Object.keys(state.ignores || {}).forEach((name) => {
      if (!allChecks.find((c) => c.check === name)) {
        allChecks.push({ check: name, severity: 'INFO', title: '(ignored)', silenced: true });
      } else {
        allChecks.find((c) => c.check === name).silencedBy = 'ignored';
      }
    });

    if (allChecks.length === 0) {
      list.innerHTML = '<div class="check-row" style="padding: 1.5rem; color: var(--fg-muted);">All checks passing – nothing to act on.</div>';
      return;
    }

    allChecks.forEach((c) => {
      const row = document.createElement('div');
      row.className = 'check-row';
      if (c.silenced) row.classList.add('silenced');
      const badge = c.silencedBy ? ` <span class="badge ${c.silencedBy}">${c.silencedBy}</span>` : '';
      row.innerHTML = `
        <div>${SEV_ICON[c.severity] || '?'}</div>
        <div class="check-name">${escapeHtml(c.check)}${badge}</div>
        <div class="check-title">${escapeHtml(c.title || '')}</div>
        <div class="check-actions">
          <button data-act="snooze" data-check="${escapeHtml(c.check)}">Snooze 4h</button>
          <button data-act="ignore" data-check="${escapeHtml(c.check)}">Ignore</button>
          <button data-act="unsilence" data-check="${escapeHtml(c.check)}">Clear</button>
        </div>
      `;
      list.appendChild(row);
    });

    list.querySelectorAll('button').forEach((b) => {
      b.addEventListener('click', () => onCheckAction(b.dataset.act, b.dataset.check));
    });
  }

  async function onCheckAction(act, check) {
    try {
      if (act === 'snooze') {
        await api('POST', '/state/snooze', { check, hours: 4 });
        toast(`Snoozed ${check} for 4h`);
      } else if (act === 'ignore') {
        await api('POST', '/state/ignore', { check });
        toast(`Ignored ${check}`);
      } else if (act === 'unsilence') {
        await Promise.all([
          api('DELETE', `/state/snooze/${encodeURIComponent(check)}`).catch(() => {}),
          api('DELETE', `/state/ignore/${encodeURIComponent(check)}`).catch(() => {}),
        ]);
        toast(`Cleared silencing for ${check}`);
      }
      refresh();
    } catch (e) {
      toast(e.message, true);
    }
  }

  function showOutput(title, content) {
    $('output-title').textContent = title;
    $('output-content').textContent = content;
    show($('output-drawer'));
    $('output-drawer').scrollIntoView({ behavior: 'smooth', block: 'nearest' });
  }

  $('refresh-btn').addEventListener('click', refresh);

  $('apply-sec-btn').addEventListener('click', async () => {
    if (!confirm('Run unattended-upgrade now?')) return;
    $('apply-sec-btn').disabled = true;
    toast('Applying security updates… this may take a minute.');
    try {
      const r = await api('POST', '/actions/apply-security');
      showOutput(`Apply security updates · exit ${r.exit_code}`, r.output);
      toast(r.ok ? 'Security updates applied' : `Failed (exit ${r.exit_code})`, !r.ok);
      refresh();
    } catch (e) {
      toast(e.message, true);
    } finally {
      $('apply-sec-btn').disabled = false;
    }
  });

  $('run-now-btn').addEventListener('click', async () => {
    $('run-now-btn').disabled = true;
    toast('Running watchlog…');
    try {
      const r = await api('POST', '/runs');
      showOutput(`watchlog run · exit ${r.exit_code}`, r.output);
      refresh();
    } catch (e) {
      toast(e.message, true);
    } finally {
      $('run-now-btn').disabled = false;
    }
  });

  $('clear-state-btn').addEventListener('click', async () => {
    if (!confirm('Clear ALL snoozes and ignores?')) return;
    try {
      const state = await api('GET', '/state');
      await Promise.all([
        ...Object.keys(state.snoozes || {}).map((c) =>
          api('DELETE', `/state/snooze/${encodeURIComponent(c)}`).catch(() => {})),
        ...Object.keys(state.ignores || {}).map((c) =>
          api('DELETE', `/state/ignore/${encodeURIComponent(c)}`).catch(() => {})),
      ]);
      toast('Cleared all snoozes and ignores');
      refresh();
    } catch (e) {
      toast(e.message, true);
    }
  });

  function escapeHtml(s) {
    return String(s).replace(/[&<>"']/g, (c) => ({
      '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;',
    }[c]));
  }

  // Auto-refresh every 60s
  setInterval(() => { if (token) refresh(); }, 60000);

  // Init
  loginVisible();
</script>
</body>
</html>
