# watchlog configuration
# Copy to /etc/watchlog/config.yaml and edit.

# =====================================================================
# Notifications – where alerts go when something needs attention
# =====================================================================
# watchlog supports multiple channels at once. Pick what works for your setup:
#
#   ✅ TELEGRAM (recommended for most users)
#      Works on ANY server with internet. No mail server needed.
#      Setup: `watchlog telegram setup` (5 min, walks you through BotFather)
#
#   📧 EMAIL via LOCAL mail server
#      If you already have Postfix/Exim running on this server.
#      Default smtp_host: 127.0.0.1, port 25.
#      Setup: just enable below.
#
#   📧 EMAIL via EXTERNAL SMTP relay (Gmail, Mailgun, SendGrid, AWS SES…)
#      No local mail server needed; uses an external service.
#      Setup: enable below + fill smtp_host/port/user/password.
#
#   For comparison and tradeoffs see:
#   https://github.com/Belikebee1/watchlog#choosing-notification-channels
# =====================================================================

notifications:
  # ----- EMAIL reporter -----
  # DISABLED by default. If your server has no mail client set up and no
  # external SMTP credentials, leave this off and use Telegram below.
  email:
    enabled: false
    to: you@example.com
    from: watchlog@example.com
    # For LOCAL Postfix/Exim on this server (most common):
    smtp_host: 127.0.0.1
    smtp_port: 25
    smtp_user: ""        # empty = no auth (local mail server)
    smtp_password: ""
    smtp_starttls: false
    # For EXTERNAL relay (Gmail example):
    #   smtp_host: smtp.gmail.com
    #   smtp_port: 587
    #   smtp_user: your-account@gmail.com
    #   smtp_password: "google-app-password"   # NOT your regular password
    #   smtp_starttls: true
    only_when: warn      # ok / info / warn / critical

  # Telegram reporter – interactive notifications with action buttons.
  # Run `watchlog telegram setup` for a guided walkthrough to obtain bot_token + chat_id.
  # The reporter only SENDS messages; for buttons to work you also need the daemon:
  #   sudo watchlog telegram install-service
  #   sudo systemctl start watchlog-bot
  telegram:
    enabled: false
    bot_token: ""        # from @BotFather (e.g. "123456789:ABCdef-...")
    chat_id: ""          # from @userinfobot (numeric)
    only_when: warn      # ok / info / warn / critical

  # Status file – writes a small JSON heartbeat after every run.
  # Useful as a public dead-man's-switch: external monitors fetch this URL
  # and alert if "ran_at" gets stale (= timer stopped firing).
  # Mount this path under a publicly accessible URL (e.g. via Nginx).
  status_file:
    enabled: false
    path: /var/www/html/watchlog/status.json
    # Recommended: serve at https://your-domain/status.json
    # The file contains: ran_at, hostname, watchlog_version, worst_severity,
    # check counts, and a compact list of actionable findings.

# Per-check configuration. Disable any check by setting enabled: false.
checks:
  apt_updates:
    enabled: true
    # If a security update appears, escalate to critical
    security_severity: critical

  ssl_certs:
    enabled: true
    paths:
      - /etc/letsencrypt/live
    warn_days: 30
    critical_days: 7

  disk_space:
    enabled: true
    warn_pct: 80
    critical_pct: 90
    # Mountpoints to ignore (snap, tmpfs, etc.)
    ignore:
      - /snap
      - /run

  memory:
    enabled: true
    warn_mb_free: 500
    critical_mb_free: 100

  services:
    enabled: true
    must_be_active:
      - postfix
      - dovecot
      - opendkim
      - nginx
      - docker
      - php8.3-fpm
      - fail2ban

  docker_images:
    enabled: true
    images:
      - postgres:16-alpine
      - n8nio/n8n:latest
      - axllent/mailpit

  ip_blacklist:
    enabled: true
    ip: ""  # auto-detect if empty
    lists:
      - zen.spamhaus.org
      - bl.spamcop.net
      - b.barracudacentral.org
      - dnsbl.sorbs.net

  dns_records:
    enabled: true
    domains:
      - example.com
    require:
      - mx
      - spf
      - dmarc

  ssh_brute:
    enabled: true
    threshold_24h: 1000  # alert if more failed logins than this
    log_path: /var/log/auth.log

  # ----- v0.4 checks -----

  fail2ban_stats:
    enabled: true
    # WARN if currently_banned across all jails exceeds this
    warn_currently_banned: 50
    critical_currently_banned: 200
    # Optional: list of jail names that MUST be active (else WARN)
    required_jails:
      - sshd

  open_ports:
    enabled: true
    # First run captures the baseline. Diff is reported afterward.
    baseline: /var/lib/watchlog/ports-baseline.txt
    # Severity when a NEW port appears since baseline (possible intrusion)
    new_port_severity: warn      # ok / info / warn / critical
    # Severity when a baselined port has CLOSED (service stopped)
    closed_port_severity: info

  file_integrity:
    # AIDE-based. Requires `apt install aide` + `aideinit`.
    # If AIDE not installed, this check returns INFO (no error).
    enabled: true
    timeout_s: 600              # AIDE on a populated DB can take minutes
    change_severity: critical    # changed/removed file = tampering signal
    add_severity: warn           # new file added – usually package install

# State storage – where reports get archived
state:
  log_dir: /var/log/watchlog
  retain_days: 90
