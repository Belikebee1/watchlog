# watchlog configuration
# Copy to /etc/watchlog/config.yaml and edit.

# Notifications — where reports get sent
notifications:
  # Email reporter
  email:
    enabled: true
    to: you@example.com
    from: watchlog@example.com
    smtp_host: 127.0.0.1
    smtp_port: 25
    smtp_user: ""        # empty = no auth (local Postfix)
    smtp_password: ""
    smtp_starttls: false
    # Send mail only when worst result is at this severity or higher
    only_when: warn      # ok / info / warn / critical

  # Telegram reporter — interactive notifications with action buttons.
  # Run `watchlog telegram setup` for a guided walkthrough to obtain bot_token + chat_id.
  # The reporter only SENDS messages; for buttons to work you also need the daemon:
  #   sudo watchlog telegram install-service
  #   sudo systemctl start watchlog-bot
  telegram:
    enabled: false
    bot_token: ""        # from @BotFather (e.g. "123456789:ABCdef-...")
    chat_id: ""          # from @userinfobot (numeric)
    only_when: warn      # ok / info / warn / critical

  # Status file — writes a small JSON heartbeat after every run.
  # Useful as a public dead-man's-switch: external monitors fetch this URL
  # and alert if "ran_at" gets stale (= timer stopped firing).
  # Mount this path under a publicly accessible URL (e.g. via Nginx).
  status_file:
    enabled: false
    path: /var/www/html/watchlog/status.json
    # Recommended: serve at https://your-domain/status.json
    # The file contains: ran_at, hostname, watchlog_version, worst_severity,
    # check counts, and a compact list of actionable findings.

# Per-check configuration. Disable any check by setting enabled: false.
checks:
  apt_updates:
    enabled: true
    # If a security update appears, escalate to critical
    security_severity: critical

  ssl_certs:
    enabled: true
    paths:
      - /etc/letsencrypt/live
    warn_days: 30
    critical_days: 7

  disk_space:
    enabled: true
    warn_pct: 80
    critical_pct: 90
    # Mountpoints to ignore (snap, tmpfs, etc.)
    ignore:
      - /snap
      - /run

  memory:
    enabled: true
    warn_mb_free: 500
    critical_mb_free: 100

  services:
    enabled: true
    must_be_active:
      - postfix
      - dovecot
      - opendkim
      - nginx
      - docker
      - php8.3-fpm
      - fail2ban

  docker_images:
    enabled: true
    images:
      - postgres:16-alpine
      - n8nio/n8n:latest
      - axllent/mailpit

  ip_blacklist:
    enabled: true
    ip: ""  # auto-detect if empty
    lists:
      - zen.spamhaus.org
      - bl.spamcop.net
      - b.barracudacentral.org
      - dnsbl.sorbs.net

  dns_records:
    enabled: true
    domains:
      - example.com
    require:
      - mx
      - spf
      - dmarc

  ssh_brute:
    enabled: true
    threshold_24h: 1000  # alert if more failed logins than this
    log_path: /var/log/auth.log

# State storage — where reports get archived
state:
  log_dir: /var/log/watchlog
  retain_days: 90
